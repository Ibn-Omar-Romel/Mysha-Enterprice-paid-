# Render Blueprint — defines the whole deployment (web service + database).
# On Render: New → Blueprint → connect this repo → Apply. Render reads this file.
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: mysha-db
    databaseName: mysha
    user: mysha
    plan: free

services:
  - type: web
    name: mysha-enterprise
    runtime: node
    plan: free
    # Build: install pnpm, install deps (incl. dev deps needed to build),
    # build frontend + API, create/update DB tables, seed the sample product.
    buildCommand: >-
      npm install -g pnpm@9 &&
      pnpm install --no-frozen-lockfile --prod=false &&
      pnpm -r --if-present run build &&
      pnpm --filter @workspace/db push-force &&
      pnpm --filter @workspace/db seed:sample &&
      pnpm --filter @workspace/db seed:phones
    # The API server also serves the built website, so one service runs everything.
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mysha-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true   # Render generates a strong secret automatically
      - key: ADMIN_EMAILS
        value: ibnomarromel@gmail.com
